syntax = "proto3";

package riskshield.telematics.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.telematics.v1";
option java_multiple_files = true;

// telematics-ingest: high-throughput telematics ingest (Cassandra)
service TelematicsIngestService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
