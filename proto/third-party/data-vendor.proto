syntax = "proto3";

package riskshield.thirdparty.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.thirdparty.v1";
option java_multiple_files = true;

// data-vendor: external data vendor integration (Verisk, ISO, etc.)
service DataVendorService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
