syntax = "proto3";

package riskshield.actuarial.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.actuarial.v1";
option java_multiple_files = true;

// ifrs17-service: IFRS 17 cashflow + CSM tracking engine (Haskell, pure)
service Ifrs17Service {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
