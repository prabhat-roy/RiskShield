syntax = "proto3";

package riskshield.analytics.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.analytics.v1";
option java_multiple_files = true;

// ctr-analytics: conversion / quote-to-bind funnel analytics
service CtrAnalyticsService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
