syntax = "proto3";

package riskshield.analytics.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.analytics.v1";
option java_multiple_files = true;

// loss-analytics: loss-ratio / combined-ratio analytics
service LossAnalyticsService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
