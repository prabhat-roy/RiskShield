syntax = "proto3";

package riskshield.compliance.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.compliance.v1";
option java_multiple_files = true;

// solvency-reporting: Solvency II SCR/MCR + QRT (XBRL)
service SolvencyReportingService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
