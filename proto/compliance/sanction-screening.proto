syntax = "proto3";

package riskshield.compliance.v1;

import "riskshield/common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.compliance.v1";
option java_multiple_files = true;

// sanction-screening: OFAC / EU sanctions screening (synchronous, blocking).
// A hit blocks policy issuance + claim payment until compliance review.
service SanctionScreeningService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
