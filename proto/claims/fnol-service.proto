syntax = "proto3";

package riskshield.claims.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.claims.v1";
option java_multiple_files = true;

// fnol-service: First Notice of Loss intake
// Sanction-screening + fraud graph run synchronously at FNOL.
service FnolService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
