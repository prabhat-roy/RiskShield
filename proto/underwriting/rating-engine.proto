syntax = "proto3";

package riskshield.underwriting.v1;

import "google/protobuf/timestamp.proto";

option java_package = "com.riskshield.underwriting.v1";
option java_multiple_files = true;

// rating-engine: pure type-safe rating engine (Haskell)
// Every rating call stores full input/output snapshot for regulatory back-testing.
service RatingEngineService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp checked_at = 3;
}
