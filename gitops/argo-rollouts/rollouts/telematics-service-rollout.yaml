apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: telematics-service, namespace: riskshield }
spec:
  replicas: 6
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: riskshield-canary-analysis }]
            args: [{ name: service-name, value: telematics-service }]
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: telematics-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: telematics-service }
    spec:
      containers:
        - name: telematics-service
          image: harbor.riskshield.internal/riskshield/telematics-service
          ports: [{ containerPort: 50000 }]
