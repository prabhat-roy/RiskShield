apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: fraud-detection, namespace: riskshield }
spec:
  replicas: 4
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: riskshield-canary-analysis }]
            args: [{ name: service-name, value: fraud-detection }]
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: fraud-detection }
  template:
    metadata:
      labels: { app.kubernetes.io/name: fraud-detection }
    spec:
      containers:
        - name: fraud-detection
          image: harbor.riskshield.internal/riskshield/fraud-detection
          ports: [{ containerPort: 8000 }]
