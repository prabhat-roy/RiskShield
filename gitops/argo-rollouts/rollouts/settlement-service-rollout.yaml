apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: settlement-service, namespace: riskshield }
spec:
  replicas: 4
  strategy:
    blueGreen:
      activeService: settlement-service-active
      previewService: settlement-service-preview
      autoPromotionEnabled: false
      prePromotionAnalysis:
        templates: [{ templateName: riskshield-canary-analysis }]
        args: [{ name: service-name, value: settlement-service }]
  selector:
    matchLabels: { app.kubernetes.io/name: settlement-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: settlement-service }
    spec:
      containers:
        - name: settlement-service
          image: harbor.riskshield.internal/riskshield/settlement-service
          ports: [{ containerPort: 8080 }]
