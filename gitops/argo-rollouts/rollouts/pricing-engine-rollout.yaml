apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: pricing-engine, namespace: riskshield }
spec:
  replicas: 4
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 10m }
        - analysis:
            templates: [{ templateName: riskshield-canary-analysis }]
            args: [{ name: service-name, value: pricing-engine }]
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: pricing-engine }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pricing-engine }
    spec:
      tolerations:
        - { key: workload, value: actuarial, effect: NoSchedule }
      containers:
        - name: pricing-engine
          image: harbor.riskshield.internal/riskshield/pricing-engine
          ports: [{ containerPort: 9090 }]
