apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata: { name: sanction-screening, namespace: riskshield }
spec:
  replicas: 4
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause: { duration: 10m }
        - analysis:
            templates: [{ templateName: riskshield-canary-analysis }]
            args: [{ name: service-name, value: sanction-screening }]
        - setWeight: 25
        - pause: { duration: 10m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: sanction-screening }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sanction-screening }
    spec:
      containers:
        - name: sanction-screening
          image: harbor.riskshield.internal/riskshield/sanction-screening
          ports: [{ containerPort: 8080 }]
