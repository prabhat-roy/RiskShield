# Flux uses HelmReleases generated by an external tool; one HelmRelease per service.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: riskshield-platform, namespace: riskshield }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: riskshield, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: riskshield-cloud-overlay
      valuesKey: cloud-values.yaml
