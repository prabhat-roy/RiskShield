name: pr-validation
on:
  pull_request:
    branches: [main]
permissions: { contents: read, security-events: write, pull-requests: read }
jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Hadolint
        uses: hadolint/hadolint-action@v3
        with: { recursive: true }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
      - name: Trivy FS
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: CRITICAL,HIGH }
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with: { languages: 'go,java,javascript,python,kotlin' }
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3
      - name: OpenSSF Scorecard
        uses: ossf/scorecard-action@v2
        with: { results_file: scorecard.sarif, results_format: sarif }
      - name: Conftest (OPA)
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz | tar xz
          ./conftest test --policy security/opa/policies kubernetes/

  haskell-purity:
    if: contains(github.event.pull_request.changed_files, 'src/actuarial/pricing-engine')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with: { ghc-version: '9.8' }
      - name: Build pricing engine (purity gate)
        working-directory: src/actuarial/pricing-engine
        run: |
          cabal update
          cabal build --ghc-options="-Werror -Wall -Wincomplete-patterns -Wpartial-fields"
          cabal test --test-show-details=direct
      - name: Forbid IO leakage in pure modules
        run: |
          if grep -RE 'unsafePerformIO|IORef|MVar' src/actuarial/pricing-engine/src; then
            echo "Pricing engine must remain pure (CLAUDE.md rule)"; exit 1
          fi

  r-actuarial:
    if: contains(github.event.pull_request.changed_files, 'src/actuarial')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: '4.4' }
      - name: Run testthat
        run: Rscript -e 'testthat::test_dir("src/actuarial/tests", reporter="summary", stop_on_failure=TRUE)'
