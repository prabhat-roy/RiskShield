image: {repository: riskshield/telematics-service, tag: "", pullPolicy: IfNotPresent}
replicaCount: 6
service: {type: ClusterIP, port: 50000, targetPort: 50000}
resources:
  requests: {cpu: 500m, memory: 512Mi}
  limits: {cpu: 2000m, memory: 2Gi}
probes:
  liveness: {httpGet: {path: /healthz, port: 50000}, initialDelaySeconds: 15, periodSeconds: 20}
  readiness: {httpGet: {path: /healthz, port: 50000}, initialDelaySeconds: 5, periodSeconds: 10}
serviceAccount: {create: true, annotations: {}}
podLabels:
  app.kubernetes.io/name: telematics-service
  app.kubernetes.io/part-of: riskshield
  riskshield.io/domain: telematics
  riskshield.io/owner-team: telematics
podAnnotations: {}
securityContext: {runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
containerSecurityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
env: []
envFrom: []
config:
  LOG_LEVEL: info
  KAFKA_TOPIC_INGEST: telematics.event.ingest
  CASSANDRA_KEYSPACE: telematics
cloud: {provider: "", storageClass: "", ingressClass: ""}
