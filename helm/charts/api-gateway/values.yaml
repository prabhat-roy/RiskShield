# Cloud-agnostic defaults for api-gateway.
image:
  repository: riskshield/api-gateway
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 50000
  targetPort: 50000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 1Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 50000
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    httpGet:
      path: /healthz
      port: 50000
    initialDelaySeconds: 5
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: api-gateway
  app.kubernetes.io/part-of: riskshield
  riskshield.io/domain: platform
  riskshield.io/owner-team: platform

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env: []
envFrom: []

config:
  LOG_LEVEL: info

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
