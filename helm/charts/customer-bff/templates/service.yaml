apiVersion: v1
kind: Service
metadata:
  name: {{ include "customer-bff.fullname" . }}
  labels: {{- include "customer-bff.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - {port: {{ .Values.service.port }}, targetPort: http, protocol: TCP, name: http}
  selector: {{- include "customer-bff.selectorLabels" . | nindent 4 }}
