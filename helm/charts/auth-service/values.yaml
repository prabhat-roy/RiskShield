image: {repository: riskshield/auth-service, tag: "", pullPolicy: IfNotPresent}
replicaCount: 3
service: {type: ClusterIP, port: 50000, targetPort: 50000}
resources:
  requests: {cpu: 200m, memory: 256Mi}
  limits: {cpu: 1500m, memory: 1Gi}
probes:
  liveness: {httpGet: {path: /healthz, port: 50000}, initialDelaySeconds: 20, periodSeconds: 20}
  readiness: {httpGet: {path: /healthz, port: 50000}, initialDelaySeconds: 5, periodSeconds: 10}
serviceAccount: {create: true, annotations: {}}
podLabels:
  app.kubernetes.io/name: auth-service
  app.kubernetes.io/part-of: riskshield
  riskshield.io/domain: identity
  riskshield.io/owner-team: identity
podAnnotations: {}
securityContext: {runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
containerSecurityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
env: []
envFrom: []
config: {LOG_LEVEL: info, OIDC_ISSUER: "https://keycloak.riskshield.svc/realms/riskshield"}
cloud: {provider: "", storageClass: "", ingressClass: ""}
