image: {repository: riskshield/policy-admin, tag: "", pullPolicy: IfNotPresent}
replicaCount: 4
service: {type: ClusterIP, port: 8080, targetPort: 8080}
resources:
  requests: {cpu: 500m, memory: 1Gi}
  limits: {cpu: 2000m, memory: 4Gi}
probes:
  liveness: {httpGet: {path: /actuator/health/liveness, port: 8080}, initialDelaySeconds: 60, periodSeconds: 20}
  readiness: {httpGet: {path: /actuator/health/readiness, port: 8080}, initialDelaySeconds: 30, periodSeconds: 10}
serviceAccount: {create: true, annotations: {}}
podLabels:
  app.kubernetes.io/name: policy-admin
  app.kubernetes.io/part-of: riskshield
  riskshield.io/domain: policy
  riskshield.io/owner-team: policy
podAnnotations: {}
securityContext: {runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
containerSecurityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: ["ALL"]}}
env: []
envFrom: []
config: {LOG_LEVEL: info, SPRING_PROFILES_ACTIVE: prod}
cloud: {provider: "", storageClass: "", ingressClass: ""}
