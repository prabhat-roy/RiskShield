apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: riskshield-rate-limit, namespace: riskshield }
spec: { rateLimit: { average: 200, burst: 400, sourceCriterion: { ipStrategy: { depth: 1 } } } }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: riskshield-headers, namespace: riskshield }
spec:
  headers:
    customRequestHeaders: { X-Forwarded-Proto: https }
    contentSecurityPolicy: "default-src 'self'"
    frameDeny: true
    sslRedirect: true
    stsSeconds: 31536000
