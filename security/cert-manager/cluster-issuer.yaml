apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: { name: riskshield-vault-issuer }
spec:
  vault:
    server: https://vault.riskshield.internal
    path: pki/sign/riskshield-mesh
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        secretRef: { name: cert-manager-vault-token, key: token }
