apiVersion: jaegertracing.io/v1
kind: Jaeger
metadata: { name: riskshield, namespace: observability }
spec:
  strategy: production
  storage:
    type: elasticsearch
    options: { es: { server-urls: "http://elasticsearch:9200", index-prefix: jaeger-riskshield } }
  sampling:
    options:
      default_strategy: { type: probabilistic, param: 0.05 }
      per_operation_strategies:
        - { operation: "POST /policy/issue",   type: probabilistic, param: 1.0 }
        - { operation: "POST /claims/fnol",    type: probabilistic, param: 1.0 }
        - { operation: "POST /sanction/check", type: probabilistic, param: 1.0 }
