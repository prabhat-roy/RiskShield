[SERVICE]
    Daemon Off
    HTTP_Server On
    HTTP_Port 2020
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /var/log/containers/*riskshield*.log
    Parser docker
    Tag kube.*
    Refresh_Interval 5

[FILTER]
    Name modify
    Match *
    Add cluster riskshield

# PII / PCI masking — never let raw PAN, CVV, NI numbers reach Loki.
[FILTER]
    Name modify
    Match *
    Rename ssn ssn_redacted
    Rename national_insurance_number ni_redacted
    Rename pan card_pan_redacted
    Rename cvv card_cvv_redacted

[OUTPUT]
    Name loki
    Match kube.*
    host loki
    port 3100
    labels job=riskshield, app=$kubernetes['labels']['app.kubernetes.io/name'], domain=$kubernetes['labels']['riskshield.io/domain']
