apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: api-gateway-availability, namespace: observability }
spec:
  target: '99.95'
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="api-gateway",status=~"5.."} }
      total:  { metric: http_requests_total{app="api-gateway"} }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: sanction-screening-availability, namespace: observability }
spec:
  target: '99.99'   # gate-keeping service — must not fail
  window: 4w
  indicator:
    ratio:
      errors: { metric: http_requests_total{app="sanction-screening",status=~"5.."} }
      total:  { metric: http_requests_total{app="sanction-screening"} }
---
apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata: { name: pricing-engine-latency, namespace: observability }
spec:
  target: '99.0'
  window: 4w
  indicator:
    latency:
      success:
        metric: pricing_engine_quote_duration_seconds_bucket{le="2"}
      total:
        metric: pricing_engine_quote_duration_seconds_count
