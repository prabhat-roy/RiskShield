global:
  resolve_timeout: 5m

route:
  receiver: riskshield-default
  group_by: [app, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: pagerduty-riskshield
      continue: true
    - matchers: [team="compliance"]
      receiver: slack-compliance
    - matchers: [team="actuarial"]
      receiver: slack-actuarial
    - matchers: [team=~".+"]
      receiver: slack-team-channel
      group_by: [team]

receivers:
  - name: riskshield-default
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#riskshield-alerts'

  - name: pagerduty-riskshield
    pagerduty_configs:
      - service_key: ${PAGERDUTY_KEY}

  - name: slack-team-channel
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#riskshield-{{ .CommonLabels.team }}'

  - name: slack-compliance
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#riskshield-compliance-oncall'

  - name: slack-actuarial
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#riskshield-actuarial-oncall'

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [app]
