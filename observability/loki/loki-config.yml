auth_enabled: false
server: { http_listen_port: 3100 }
ingester:
  lifecycler: { ring: { kvstore: { store: inmemory }, replication_factor: 1 } }
  chunk_idle_period: 30m
  max_chunk_age: 1h
schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index: { prefix: riskshield_, period: 24h }
storage_config:
  aws: { s3: riskshield-loki, region: eu-west-1 }
limits_config:
  retention_period: 87600h    # 10y — Solvency II / IFRS 17 / FCA
  reject_old_samples: true
  reject_old_samples_max_age: 168h
