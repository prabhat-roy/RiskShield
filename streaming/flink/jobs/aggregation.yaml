apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: riskshield-aggregation, namespace: riskshield }
spec:
  deploymentName: riskshield-flink
  job:
    jarURI: s3://riskshield-flink-jobs/aggregation.jar
    parallelism: 8
    upgradeMode: savepoint
    args: ["--source-topic", "riskshield.events.enriched", "--sink-topic", "riskshield.metrics.aggregated", "--window", "5m"]
