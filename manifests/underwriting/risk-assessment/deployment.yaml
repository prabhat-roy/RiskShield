apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-assessment
  namespace: riskshield
  labels:
    app.kubernetes.io/name: risk-assessment
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: underwriting
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: risk-assessment } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: risk-assessment, riskshield.io/domain: underwriting }
    spec:
      serviceAccountName: risk-assessment
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: risk-assessment
          image: harbor.riskshield.internal/riskshield/risk-assessment:latest
          ports: [{ containerPort: 50061, name: http }]
          envFrom: [{ configMapRef: { name: risk-assessment } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50061 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50061 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
