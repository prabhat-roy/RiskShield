apiVersion: apps/v1
kind: Deployment
metadata:
  name: uw-service
  namespace: riskshield
  labels:
    app.kubernetes.io/name: uw-service
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: underwriting
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: uw-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: uw-service, riskshield.io/domain: underwriting }
    spec:
      serviceAccountName: uw-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: uw-service
          image: harbor.riskshield.internal/riskshield/uw-service:latest
          ports: [{ containerPort: 50060, name: http }]
          envFrom: [{ configMapRef: { name: uw-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50060 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
