apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-engine
  namespace: riskshield
  labels:
    app.kubernetes.io/name: rating-engine
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: underwriting
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: rating-engine } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: rating-engine, riskshield.io/domain: underwriting }
    spec:
      serviceAccountName: rating-engine
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: rating-engine
          image: harbor.riskshield.internal/riskshield/rating-engine:latest
          ports: [{ containerPort: 50062, name: http }]
          envFrom: [{ configMapRef: { name: rating-engine } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50062 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
