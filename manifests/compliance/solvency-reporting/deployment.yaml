apiVersion: apps/v1
kind: Deployment
metadata:
  name: solvency-reporting
  namespace: riskshield
  labels:
    app.kubernetes.io/name: solvency-reporting
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: solvency-reporting } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: solvency-reporting, riskshield.io/domain: compliance }
    spec:
      serviceAccountName: solvency-reporting
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: solvency-reporting
          image: harbor.riskshield.internal/riskshield/solvency-reporting:latest
          ports: [{ containerPort: 50240, name: http }]
          envFrom: [{ configMapRef: { name: solvency-reporting } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50240 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50240 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
