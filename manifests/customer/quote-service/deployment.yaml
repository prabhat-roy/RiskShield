apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-service
  namespace: riskshield
  labels:
    app.kubernetes.io/name: quote-service
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: customer
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: quote-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: quote-service, riskshield.io/domain: customer }
    spec:
      serviceAccountName: quote-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: quote-service
          image: harbor.riskshield.internal/riskshield/quote-service:latest
          ports: [{ containerPort: 50181, name: http }]
          envFrom: [{ configMapRef: { name: quote-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50181 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
