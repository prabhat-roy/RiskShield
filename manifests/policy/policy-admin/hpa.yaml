apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: policy-admin, namespace: riskshield }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: policy-admin }
  minReplicas: 4
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
