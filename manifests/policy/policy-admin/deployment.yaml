apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-admin
  namespace: riskshield
  labels:
    app.kubernetes.io/name: policy-admin
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: policy
spec:
  replicas: 4
  strategy: { type: RollingUpdate, rollingUpdate: { maxUnavailable: 0, maxSurge: 1 } }
  selector: { matchLabels: { app.kubernetes.io/name: policy-admin } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: policy-admin, riskshield.io/domain: policy }
    spec:
      serviceAccountName: policy-admin
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: policy-admin
          image: harbor.riskshield.internal/riskshield/policy-admin:latest
          ports: [{ containerPort: 8080, name: http }]
          envFrom: [{ configMapRef: { name: policy-admin } }]
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8080 }, initialDelaySeconds: 60 }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8080 }, initialDelaySeconds: 30 }
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: 2000m, memory: 4Gi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
