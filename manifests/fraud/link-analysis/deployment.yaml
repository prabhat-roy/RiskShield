apiVersion: apps/v1
kind: Deployment
metadata:
  name: link-analysis
  namespace: riskshield
  labels:
    app.kubernetes.io/name: link-analysis
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: fraud
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: link-analysis } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: link-analysis, riskshield.io/domain: fraud }
    spec:
      serviceAccountName: link-analysis
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: link-analysis
          image: harbor.riskshield.internal/riskshield/link-analysis:latest
          ports: [{ containerPort: 50142, name: http }]
          envFrom: [{ configMapRef: { name: link-analysis } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50142 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
