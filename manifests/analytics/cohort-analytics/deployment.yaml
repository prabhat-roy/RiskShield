apiVersion: apps/v1
kind: Deployment
metadata:
  name: cohort-analytics
  namespace: riskshield
  labels:
    app.kubernetes.io/name: cohort-analytics
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: cohort-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cohort-analytics, riskshield.io/domain: analytics }
    spec:
      serviceAccountName: cohort-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: cohort-analytics
          image: harbor.riskshield.internal/riskshield/cohort-analytics:latest
          ports: [{ containerPort: 50302, name: http }]
          envFrom: [{ configMapRef: { name: cohort-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50302 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
