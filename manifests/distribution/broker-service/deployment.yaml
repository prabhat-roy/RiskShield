apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker-service
  namespace: riskshield
  labels:
    app.kubernetes.io/name: broker-service
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: distribution
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: broker-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: broker-service, riskshield.io/domain: distribution }
    spec:
      serviceAccountName: broker-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: broker-service
          image: harbor.riskshield.internal/riskshield/broker-service:latest
          ports: [{ containerPort: 50161, name: http }]
          envFrom: [{ configMapRef: { name: broker-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50161 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50161 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
