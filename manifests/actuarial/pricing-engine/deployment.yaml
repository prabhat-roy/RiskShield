apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-engine
  namespace: riskshield
  labels:
    app.kubernetes.io/name: pricing-engine
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: actuarial
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: pricing-engine } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pricing-engine, riskshield.io/domain: actuarial }
    spec:
      serviceAccountName: pricing-engine
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: pricing-engine
          image: harbor.riskshield.internal/riskshield/pricing-engine:latest
          ports: [{ containerPort: 50121, name: http }]
          envFrom: [{ configMapRef: { name: pricing-engine } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50121 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50121 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
