apiVersion: apps/v1
kind: Deployment
metadata:
  name: tpa-gateway
  namespace: riskshield
  labels:
    app.kubernetes.io/name: tpa-gateway
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: third-party
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: tpa-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tpa-gateway, riskshield.io/domain: third-party }
    spec:
      serviceAccountName: tpa-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: tpa-gateway
          image: harbor.riskshield.internal/riskshield/tpa-gateway:latest
          ports: [{ containerPort: 50263, name: http }]
          envFrom: [{ configMapRef: { name: tpa-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50263 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
