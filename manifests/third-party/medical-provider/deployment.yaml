apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-provider
  namespace: riskshield
  labels:
    app.kubernetes.io/name: medical-provider
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: third-party
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: medical-provider } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: medical-provider, riskshield.io/domain: third-party }
    spec:
      serviceAccountName: medical-provider
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: medical-provider
          image: harbor.riskshield.internal/riskshield/medical-provider:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: medical-provider } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
