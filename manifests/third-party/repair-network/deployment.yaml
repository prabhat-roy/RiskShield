apiVersion: apps/v1
kind: Deployment
metadata:
  name: repair-network
  namespace: riskshield
  labels:
    app.kubernetes.io/name: repair-network
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: third-party
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: repair-network } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: repair-network, riskshield.io/domain: third-party }
    spec:
      serviceAccountName: repair-network
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: repair-network
          image: harbor.riskshield.internal/riskshield/repair-network:latest
          ports: [{ containerPort: 50260, name: http }]
          envFrom: [{ configMapRef: { name: repair-network } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
