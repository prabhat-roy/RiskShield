apiVersion: apps/v1
kind: Deployment
metadata:
  name: usage-based
  namespace: riskshield
  labels:
    app.kubernetes.io/name: usage-based
    app.kubernetes.io/part-of: riskshield
    riskshield.io/domain: telematics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: usage-based } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: usage-based, riskshield.io/domain: telematics }
    spec:
      serviceAccountName: usage-based
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: usage-based
          image: harbor.riskshield.internal/riskshield/usage-based:latest
          ports: [{ containerPort: 50282, name: http }]
          envFrom: [{ configMapRef: { name: usage-based } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50282 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
