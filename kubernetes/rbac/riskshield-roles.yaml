---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: riskshield-service-reader }
rules:
  - apiGroups: [""]
    resources: [pods, services, configmaps]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: riskshield-platform-admin }
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# Actuaries — read-only on actuarial namespace + Haskell pricing engine logs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: riskshield-actuarial-readonly, namespace: riskshield-actuarial }
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, services, configmaps]
    verbs: [get, list, watch]
---
# Compliance officer — view sanction-screening + audit trail across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: riskshield-compliance-officer }
rules:
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch]
    resourceNames: [sanction-screening, kyc-service, aml-service, solvency-reporting]
