---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny-all, namespace: riskshield }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns, namespace: riskshield }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
---
# Sanction-screening must be reachable from policy + claims namespaces only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-sanction-screening, namespace: riskshield-compliance }
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: sanction-screening }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { riskshield.io/domain: policy } }
        - namespaceSelector: { matchLabels: { riskshield.io/domain: claims } }
        - namespaceSelector: { matchLabels: { riskshield.io/domain: customer } }
      ports:
        - { port: 8080, protocol: TCP }
